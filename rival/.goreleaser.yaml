project_name: rival
version: 2

release:
  github:
    owner: 1F47E
    name: rival

builds:
  - main: .
    binary: rival
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

# Generates a Homebrew *Formula* (class Rival < Formula) at the tap repo root —
# matching the existing 1F47E/homebrew-tap layout (formulae at root, no Formula/
# or Casks/ subdir). `brews:` is marked deprecated by goreleaser in favor of
# homebrew_casks:, but a cask is the wrong artifact type for this tap, so we keep
# the formula generator. CI (release.yml) runs this on tag push with the
# HOMEBREW_TAP_TOKEN secret, so the formula is updated automatically — no manual
# rival.rb edits.
brews:
  - name: rival
    homepage: https://github.com/1F47E/rival
    description: "Dispatch prompts to GPT-5.6-Sol, Gemini, and Claude models with session tracking and TUI/web dashboard"
    license: MIT
    # directory omitted → formula written to the repo root (rival.rb)
    repository:
      owner: 1F47E
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: "[email protected]"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
