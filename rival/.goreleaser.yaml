project_name: rival
version: 2

release:
  github:
    owner: 1F47E
    name: rival

builds:
  - main: .
    binary: rival
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: rival
    homepage: https://github.com/1F47E/rival
    description: "Dispatch prompts to Codex and Gemini CLIs from Claude Code with session tracking and TUI dashboard"
    license: MIT
    install: |
      bin.install "rival"
    test: |
      system "#{bin}/rival", "version"
    repository:
      owner: 1F47E
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
